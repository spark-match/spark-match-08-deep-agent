name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest --tb=short

      - name: Run eval (mock mode)
        run: uv run python -m evals.runner --mode mock

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Lint (ruff format check)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - run: uv python install 3.14
      - run: uv sync --all-groups
      - name: Build wheel
        run: uv build
      - name: Verify metadata
        run: uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'], tomllib.load(open('pyproject.toml','rb'))['project']['version'])"